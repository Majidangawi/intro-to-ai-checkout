<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم — MA Learn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Gumela'; src:url('../brand_assets/gumela-arabic-bold.otf') format('opentype'); font-weight:700; }
    @font-face { font-family:'Gumela'; src:url('../brand_assets/gumela-arabic-regular.otf') format('opentype'); font-weight:400; }

    :root {
      --bg:#080808; --surface:#0E0E0E; --surface2:#141414; --surface3:#1A1A1A;
      --gold:#C9A84C; --gold-lum:#E8D08A; --ivory:#F5F0E8;
      --silver:#BBBBBB; --grey:#666; --border:rgba(201,168,76,0.12);
      --green:#4CAF82; --red:#E05252;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'Gumela','Cairo',sans-serif;background:var(--bg);color:var(--ivory);direction:rtl;}

    /* ── Login screen ─────────────────────── */
    #login-screen {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:32px;
    }
    .login-card {
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:16px; padding:40px; width:100%; max-width:360px; text-align:center;
    }

    /* ── App shell ───────────────────────── */
    #app { display:none; grid-template-rows:56px 1fr; height:100vh; }
    .topbar {
      background:rgba(8,8,8,0.95); border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; backdrop-filter:blur(12px);
    }
    .app-body { display:grid; grid-template-columns:280px 1fr; overflow:hidden; }

    /* ── Sidebar ─────────────────────────── */
    .sidebar {
      background:var(--surface); border-left:1px solid var(--border);
      overflow-y:auto; padding:16px 0;
    }
    .sidebar-section { padding:8px 16px; font-size:0.65rem; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; margin-top:8px; }
    .course-tab {
      padding:10px 16px; font-size:0.85rem; cursor:pointer;
      display:flex; align-items:center; gap:10px;
      border-right:3px solid transparent; transition:all 0.2s; color:var(--silver);
    }
    .course-tab:hover { background:rgba(255,255,255,0.02); color:var(--ivory); }
    .course-tab.active { background:rgba(201,168,76,0.07); color:var(--gold); border-right-color:var(--gold); }
    .lesson-item-nav {
      padding:9px 16px 9px 28px; font-size:0.78rem; cursor:pointer;
      display:flex; align-items:center; gap:8px;
      border-right:3px solid transparent; transition:all 0.2s; color:var(--grey);
    }
    .lesson-item-nav:hover { color:var(--silver); background:rgba(255,255,255,0.01); }
    .lesson-item-nav.active { color:var(--gold); border-right-color:var(--gold); background:rgba(201,168,76,0.05); }
    .lesson-item-nav .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .lesson-item-nav .status-dot.has-video { background:var(--green); }
    .lesson-item-nav .status-dot.no-video { background:rgba(255,255,255,0.15); }
    .lesson-item-nav .status-dot.inactive { background:var(--red); opacity:0.6; }
    .module-header-nav {
      padding:10px 16px; font-size:0.75rem; font-weight:700;
      color:var(--silver); letter-spacing:0.02em;
      border-bottom:1px solid rgba(255,255,255,0.04); margin-top:4px;
      cursor:pointer; display:flex; justify-content:space-between; align-items:center;
    }
    .module-header-nav:hover { color:var(--ivory); }

    /* ── Editor panel ────────────────────── */
    .editor { overflow-y:auto; padding:32px; background:var(--bg); }
    .editor-empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100%; color:var(--grey); text-align:center; gap:12px;
    }

    /* ── Form elements ───────────────────── */
    .form-group { margin-bottom:24px; }
    .form-label { display:block; font-size:0.78rem; color:var(--silver); margin-bottom:8px; font-weight:400; }
    .form-hint  { font-size:0.7rem; color:var(--grey); margin-top:6px; line-height:1.6; }
    .input-field {
      width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.2);
      border-radius:8px; padding:11px 14px; color:var(--ivory);
      font-family:'Cairo',sans-serif; font-size:0.875rem; outline:none; direction:ltr;
      transition:border-color 0.2s;
    }
    .input-field:focus { border-color:rgba(201,168,76,0.55); }
    .input-field::placeholder { color:rgba(255,255,255,0.25); }
    .input-field.has-value { border-color:rgba(76,175,130,0.4); }

    .btn-save {
      background:var(--gold); color:#000; font-family:'Gumela','Cairo',sans-serif;
      font-weight:700; padding:12px 32px; border:none; cursor:pointer;
      font-size:0.9rem; transition:background 0.2s; border-radius:0;
    }
    .btn-save:hover { background:var(--gold-lum); }
    .btn-save:disabled { opacity:0.4; cursor:not-allowed; }

    /* ── Toggle ──────────────────────────── */
    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-top:1px solid rgba(255,255,255,0.05); }
    .toggle { position:relative; width:44px; height:24px; cursor:pointer; }
    .toggle input { display:none; }
    .toggle-track { width:44px; height:24px; border-radius:12px; background:rgba(255,255,255,0.1); transition:background 0.2s; }
    .toggle input:checked + .toggle-track { background:var(--green); }
    .toggle-thumb {
      position:absolute; top:3px; right:3px; width:18px; height:18px;
      border-radius:50%; background:white; transition:right 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb { right:23px; }

    /* ── Video preview ───────────────────── */
    .video-preview {
      background:rgba(0,0,0,0.4); border-radius:8px; overflow:hidden;
      margin-top:12px; display:none;
    }
    .video-preview iframe { width:100%; aspect-ratio:16/9; border:none; display:block; }

    /* ── Status badge ────────────────────── */
    .save-status { font-size:0.78rem; margin-top:8px; height:20px; }
    .save-status.saving { color:var(--gold); }
    .save-status.saved  { color:var(--green); }
    .save-status.error  { color:var(--red); }

    /* ── Loading ─────────────────────────── */
    .spinner { width:20px; height:20px; border:2px solid rgba(201,168,76,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Cards ───────────────────────────── */
    .card { background:rgba(255,255,255,0.02); border:1px solid rgba(201,168,76,0.12); border-radius:12px; padding:24px; }
    .divider { height:1px; background:linear-gradient(to left,transparent,rgba(201,168,76,0.15),transparent); margin:20px 0; }
    .tag { display:inline-block; font-size:0.65rem; padding:3px 9px; border-radius:12px; font-weight:700; }
    .tag.green { background:rgba(76,175,130,0.15); color:var(--green); }
    .tag.red   { background:rgba(224,82,82,0.15); color:var(--red); }
    .tag.gold  { background:rgba(201,168,76,0.12); color:var(--gold); }

    /* ── Mobile ──────────────────────────── */
    @media(max-width:768px){
      .app-body{grid-template-columns:1fr;}
      .sidebar{display:none;}
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <img src="../brand_assets/logo-malearn-white.png" alt="MA Learn"
         style="height:32px;margin:0 auto 32px;display:block;" onerror="this.style.display='none'">
    <p style="font-size:0.65rem;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:24px;">لوحة التحكم</p>
    <div style="margin-bottom:16px;">
      <input id="password-input" type="password" placeholder="كلمة المرور"
        class="input-field" style="text-align:center;"
        onkeydown="if(event.key==='Enter')login()">
    </div>
    <button onclick="login()"
      class="btn-save" style="width:100%;">دخول</button>
    <p id="login-error" style="display:none;font-size:0.78rem;color:var(--red);margin-top:12px;">كلمة مرور غير صحيحة</p>
  </div>
</div>

<!-- ════════════════════════════════════════
     APP SHELL
════════════════════════════════════════ -->
<div id="app" style="display:none;grid-template-rows:56px 1fr;height:100vh;">

  <!-- Topbar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <img src="../brand_assets/logo-malearn-white.png" alt="MA Learn"
           style="height:26px;" onerror="this.style.display='none'">
      <span style="font-size:0.8rem;color:var(--grey);">|</span>
      <span style="font-size:0.82rem;color:var(--silver);">لوحة التحكم</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="sync-indicator" style="font-size:0.72rem;color:var(--grey);"></span>
      <button onclick="logout()"
        style="background:none;border:1px solid rgba(255,255,255,0.08);color:var(--grey);font-family:'Cairo',sans-serif;font-size:0.78rem;padding:6px 14px;cursor:pointer;border-radius:4px;">
        خروج
      </button>
    </div>
  </div>

  <!-- Body -->
  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">الدورات</div>

      <div class="course-tab active" onclick="selectCourse('intro-to-creative-ai')" id="tab-intro">
        <span style="color:var(--gold);">▶</span>
        <div>
          <p style="font-size:0.82rem;">مدخل إلى الذكاء الاصطناعي</p>
          <p style="font-size:0.68rem;color:var(--grey);margin-top:2px;">T2 — دورة مسجلة</p>
        </div>
      </div>

      <!-- Future courses will appear here -->
      <div style="padding:12px 16px;font-size:0.72rem;color:var(--grey);line-height:1.7;">
        الدورات القادمة تظهر هنا تلقائياً بعد إضافتها
      </div>

      <div class="divider" style="margin:0;"></div>
      <div class="sidebar-section" style="margin-top:12px;">دروس الدورة</div>
      <div id="lesson-nav-list" style="padding-bottom:16px;">
        <div style="padding:20px 16px;font-size:0.78rem;color:var(--grey);">اختر دورة لعرض دروسها</div>
      </div>
    </aside>

    <!-- Editor -->
    <main class="editor" id="editor">
      <div class="editor-empty" id="editor-empty">
        <span style="font-size:3rem;opacity:0.2;">🎬</span>
        <p style="font-size:0.9rem;">اختر درساً من القائمة لتعديله</p>
        <p style="font-size:0.78rem;color:var(--grey);">يمكنك إضافة رابط الفيديو وملف PDF لكل درس</p>
      </div>
      <div id="editor-panel" style="display:none;max-width:680px;"></div>
    </main>

  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzXC4Ef5WxNX0aPov7Q1Kdn2DiXuODd74w3iOCtovrw86o9grwVREqNsRdhlyQkoBnQ/exec';
  const ADMIN_TOKEN     = 'MAL-ADMIN-2026';
  // SHA-256 of "MALearn2026!" — change via Settings or update hash below
  const PASSWORD_HASH   = 'fe6557033a8f59360d4797a1665fc3a288173b1768e745b57b4767884ca8f227';

  let activeCourse  = null;
  let activeLessons = [];
  let activeLesson  = null;
  let loadingCourse = false;

  // ── Auth ─────────────────────────────────────────────────────────
  async function hashStr(str) {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function login() {
    const pw   = document.getElementById('password-input').value;
    const hash = await hashStr(pw);
    if (hash === PASSWORD_HASH) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display          = 'grid';
      selectCourse('intro-to-creative-ai');
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('password-input').value      = '';
    }
  }

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display          = 'none';
    document.getElementById('password-input').value       = '';
    document.getElementById('login-error').style.display  = 'none';
  }

  // ── Course loading ────────────────────────────────────────────────
  async function selectCourse(courseId) {
    if (loadingCourse) return;
    activeCourse  = courseId;
    activeLesson  = null;

    // UI: mark tab active
    document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
    const tab = document.getElementById('tab-' + courseId.replace('intro-to-creative-ai', 'intro'));
    if (tab) tab.classList.add('active');

    // Show loading in sidebar
    document.getElementById('lesson-nav-list').innerHTML =
      '<div style="padding:20px 16px;display:flex;gap:8px;align-items:center;color:var(--grey);font-size:0.78rem;"><span class="spinner"></span> جاري التحميل...</div>';

    document.getElementById('editor-empty').style.display  = 'flex';
    document.getElementById('editor-panel').style.display  = 'none';
    document.getElementById('sync-indicator').textContent  = '';

    loadingCourse = true;
    try {
      const res  = await fetch(`${APPS_SCRIPT_URL}?action=get_course_lessons&course=${courseId}`);
      const data = await res.json();

      if (data.error || !data.lessons) {
        document.getElementById('lesson-nav-list').innerHTML =
          '<div style="padding:16px;font-size:0.78rem;color:var(--red);">تعذر تحميل الدروس — تأكد من إعداد تبويب Lessons في الجدول</div>';
        return;
      }

      activeLessons = data.lessons;
      buildLessonNav(data.lessons);
    } catch (err) {
      document.getElementById('lesson-nav-list').innerHTML =
        '<div style="padding:16px;font-size:0.78rem;color:var(--red);">خطأ في الاتصال: ' + err.message + '</div>';
    } finally {
      loadingCourse = false;
    }
  }

  function buildLessonNav(lessons) {
    const container = document.getElementById('lesson-nav-list');
    container.innerHTML = '';

    // Group by module
    const modules = {};
    const moduleOrder = [];
    lessons.forEach(l => {
      const key = l.module_order + '::' + l.module;
      if (!modules[key]) { modules[key] = []; moduleOrder.push(key); }
      modules[key].push(l);
    });

    moduleOrder.forEach(key => {
      const [, moduleName] = key.split('::');
      const lessons        = modules[key];
      const allHaveVideo   = lessons.every(l => l.video_id);

      const header = document.createElement('div');
      header.className = 'module-header-nav';
      header.innerHTML = `<span>${moduleName}</span><span style="font-size:0.65rem;color:var(--grey);">${lessons.length}</span>`;
      container.appendChild(header);

      lessons.forEach(l => {
        const item = document.createElement('div');
        item.className = 'lesson-item-nav';
        item.id        = `nav-lesson-${l.id}`;

        const dotClass = !l.active ? 'inactive' : l.video_id ? 'has-video' : 'no-video';
        item.innerHTML = `<span class="status-dot ${dotClass}"></span><span>${l.title}</span>`;
        item.onclick   = () => editLesson(l);
        container.appendChild(item);
      });
    });
  }

  // ── Lesson editor ─────────────────────────────────────────────────
  function editLesson(lesson) {
    activeLesson = lesson;

    // Highlight nav item
    document.querySelectorAll('.lesson-item-nav').forEach(el => el.classList.remove('active'));
    const navItem = document.getElementById('nav-lesson-' + lesson.id);
    if (navItem) navItem.classList.add('active');

    document.getElementById('editor-empty').style.display  = 'none';
    document.getElementById('editor-panel').style.display  = 'block';

    const videoIdVal  = lesson.video_id || '';
    const pdfUrlVal   = lesson.pdf_url  || '';
    const activeVal   = lesson.active !== false;
    const hasVideo    = !!videoIdVal;

    document.getElementById('editor-panel').innerHTML = `
      <div style="margin-bottom:8px;">
        <span class="tag gold" style="font-size:0.62rem;">${lesson.module}</span>
        ${!activeVal ? '<span class="tag red" style="margin-right:6px;">مخفي</span>' : ''}
        ${hasVideo ? '<span class="tag green" style="margin-right:6px;">فيديو ✓</span>' : '<span class="tag" style="background:rgba(255,255,255,0.06);color:var(--grey);margin-right:6px;">بدون فيديو</span>'}
      </div>
      <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:8px;">${lesson.title}</h2>
      <p style="font-size:0.82rem;color:var(--silver);font-weight:300;line-height:1.8;margin-bottom:24px;">${lesson.desc || ''}</p>

      <div class="card">

        <!-- Video URL -->
        <div class="form-group">
          <label class="form-label">رابط الفيديو (YouTube)</label>
          <input type="text" id="field-video" class="input-field ${hasVideo ? 'has-value' : ''}"
            placeholder="https://www.youtube.com/watch?v=xxxxxxxx  أو  ID مباشرة"
            value="${videoIdVal}"
            oninput="onVideoInput(this.value)">
          <p class="form-hint">
            ارفع الفيديو على YouTube كـ "غير مدرج" (Unlisted) ← انسخ الرابط كاملاً أو معرف الفيديو مباشرة.<br>
            <span style="color:var(--grey);">مثال: <code style="color:var(--gold);font-size:0.85em;">dQw4w9WgXcQ</code></span>
          </p>
          <div class="video-preview" id="video-preview">
            <iframe id="preview-iframe" allowfullscreen></iframe>
          </div>
        </div>

        <div class="divider"></div>

        <!-- PDF URL -->
        <div class="form-group">
          <label class="form-label">رابط الملف PDF (اختياري)</label>
          <input type="text" id="field-pdf" class="input-field ${pdfUrlVal ? 'has-value' : ''}"
            placeholder="https://drive.google.com/file/d/xxxxx/view"
            value="${pdfUrlVal}"
            oninput="this.classList.toggle('has-value', this.value.length > 0)">
          <p class="form-hint">
            ارفع الملف على Google Drive ← اضغط "مشاركة" ← "أي شخص لديه الرابط يمكنه العرض" ← انسخ الرابط هنا.
          </p>
        </div>

        <div class="divider"></div>

        <!-- Active toggle -->
        <div class="toggle-row">
          <div>
            <p style="font-size:0.85rem;font-weight:400;">إظهار الدرس للطلاب</p>
            <p style="font-size:0.72rem;color:var(--grey);margin-top:2px;">إيقاف التشغيل يخفي الدرس من قائمة الدورة</p>
          </div>
          <label class="toggle" style="cursor:pointer;">
            <input type="checkbox" id="field-active" ${activeVal ? 'checked' : ''} onchange="updateToggleLabel(this)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>

        <div style="margin-top:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <button class="btn-save" onclick="saveLesson()" id="save-btn">حفظ التغييرات</button>
          <div class="save-status" id="save-status"></div>
        </div>

      </div>

      <!-- Lesson metadata (read-only) -->
      <div style="margin-top:16px;padding:12px 16px;background:rgba(255,255,255,0.01);border-radius:8px;border:1px solid rgba(255,255,255,0.04);">
        <p style="font-size:0.68rem;color:var(--grey);line-height:1.9;">
          معرف الدرس: <code style="color:var(--silver);">${lesson.id}</code> &nbsp;·&nbsp;
          الدورة: <code style="color:var(--silver);">${lesson.course}</code> &nbsp;·&nbsp;
          الوحدة ${lesson.module_order} · الدرس ${lesson.lesson_order}
        </p>
      </div>
    `;

    // Auto-preview if video ID exists
    if (videoIdVal) showVideoPreview(videoIdVal);
  }

  function onVideoInput(val) {
    const field = document.getElementById('field-video');
    field.classList.toggle('has-value', val.length > 0);
    const id = extractYouTubeId(val);
    if (id) showVideoPreview(id);
    else hideVideoPreview();
  }

  function showVideoPreview(videoId) {
    const preview = document.getElementById('video-preview');
    const iframe  = document.getElementById('preview-iframe');
    if (!preview || !iframe) return;
    preview.style.display = 'block';
    iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0`;
  }

  function hideVideoPreview() {
    const preview = document.getElementById('video-preview');
    if (preview) preview.style.display = 'none';
  }

  function extractYouTubeId(val) {
    val = val.trim();
    const patterns = [
      /(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#\s]{11})/
    ];
    for (const p of patterns) {
      const m = val.match(p);
      if (m) return m[1];
    }
    if (/^[a-zA-Z0-9_-]{11}$/.test(val)) return val;
    return null;
  }

  async function saveLesson() {
    if (!activeLesson) return;

    const rawVideo = (document.getElementById('field-video').value || '').trim();
    const pdfUrl   = (document.getElementById('field-pdf').value   || '').trim();
    const active   = document.getElementById('field-active').checked;
    const videoId  = extractYouTubeId(rawVideo) || rawVideo; // keep raw if not YouTube

    const btn    = document.getElementById('save-btn');
    const status = document.getElementById('save-status');

    btn.disabled         = true;
    btn.textContent      = 'جاري الحفظ...';
    status.className     = 'save-status saving';
    status.textContent   = 'يتم الحفظ...';

    try {
      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set('action',      'save_lesson_media');
      url.searchParams.set('lesson_id',   activeLesson.id);
      url.searchParams.set('video_id',    videoId);
      url.searchParams.set('pdf_url',     pdfUrl);
      url.searchParams.set('active',      active.toString());
      url.searchParams.set('admin_token', ADMIN_TOKEN);

      const res  = await fetch(url.toString());
      const data = await res.json();

      if (data.success) {
        // Update local state
        activeLesson.video_id = videoId;
        activeLesson.pdf_url  = pdfUrl;
        activeLesson.active   = active;

        // Update nav dot
        const navItem = document.getElementById('nav-lesson-' + activeLesson.id);
        if (navItem) {
          const dot = navItem.querySelector('.status-dot');
          if (dot) {
            dot.className = 'status-dot ' + (!active ? 'inactive' : videoId ? 'has-video' : 'no-video');
          }
        }

        status.className   = 'save-status saved';
        status.textContent = '✓ تم الحفظ بنجاح';
        setTimeout(() => { status.textContent = ''; }, 3000);
      } else {
        throw new Error(data.reason || 'unknown error');
      }
    } catch (err) {
      status.className   = 'save-status error';
      status.textContent = 'خطأ في الحفظ: ' + err.message;
    }

    btn.disabled    = false;
    btn.textContent = 'حفظ التغييرات';
  }

  // ── Allow Enter key in login ──────────────────────────────────────
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
