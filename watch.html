<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مدخل إلى الذكاء الاصطناعي الإبداعي | MA Learn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Gumela'; src:url('brand_assets/gumela-arabic-bold.otf') format('opentype'); font-weight:700; }
    @font-face { font-family:'Gumela'; src:url('brand_assets/gumela-arabic-regular.otf') format('opentype'); font-weight:400; }
    @font-face { font-family:'Gumela'; src:url('brand_assets/gumela-arabic-light.otf') format('opentype'); font-weight:300; }
    :root {
      --bg:#080808; --surface:#111; --surface2:#171717;
      --gold:#C9A84C; --ivory:#F5F0E8; --silver:#BBBBBB; --grey:#888;
      --border:rgba(201,168,76,0.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body { font-family:'Gumela','Cairo',sans-serif; background:var(--bg); color:var(--ivory); direction:rtl; }

    /* Layout */
    .layout { display:grid; grid-template-rows:56px 1fr; height:100vh; }
    .layout-body { display:grid; grid-template-columns:320px 1fr; overflow:hidden; }

    /* Nav */
    .top-nav {
      background:rgba(8,8,8,0.95);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; backdrop-filter:blur(12px);
    }
    .top-nav .course-name { font-size:0.85rem; font-weight:400; }
    .top-nav .progress-text { font-size:0.75rem; color:var(--grey); font-weight:300; }

    /* Sidebar */
    .sidebar {
      background:var(--surface);
      border-left:1px solid var(--border);
      overflow-y:auto;
      display:flex; flex-direction:column;
    }
    .sidebar-header {
      padding:20px 20px 16px;
      border-bottom:1px solid var(--border);
      font-size:0.7rem; color:var(--gold);
      letter-spacing:0.1em; text-transform:uppercase;
    }

    .module-group { border-bottom:1px solid var(--border); }
    .module-title {
      padding:14px 20px;
      font-size:0.85rem; font-weight:700;
      display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; user-select:none;
      transition:background 0.2s;
    }
    .module-title:hover { background:rgba(255,255,255,0.02); }
    .module-title span { color:var(--grey); font-size:0.7rem; font-weight:300; }

    .lesson-list { display:none; }
    .lesson-list.open { display:block; }
    .lesson-item {
      padding:11px 20px 11px 28px;
      font-size:0.8rem; color:var(--silver);
      font-weight:300; cursor:pointer;
      display:flex; align-items:center; gap:10px;
      transition:background 0.2s, color 0.2s;
      border-right:3px solid transparent;
    }
    .lesson-item:hover { background:rgba(201,168,76,0.05); color:var(--ivory); }
    .lesson-item.active { background:rgba(201,168,76,0.08); color:var(--gold); border-right-color:var(--gold); }
    .lesson-item .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); flex-shrink:0; }
    .lesson-item.active .dot { background:var(--gold); }
    .lesson-item.watched .dot { background:rgba(201,168,76,0.5); }

    /* Main content */
    .main-content { overflow-y:auto; display:flex; flex-direction:column; }

    /* Video area */
    .video-area { background:#000; position:relative; }
    .video-wrapper {
      width:100%; max-width:100%;
      aspect-ratio:16/9;
      position:relative;
    }
    .video-wrapper iframe {
      position:absolute; inset:0;
      width:100%; height:100%;
      border:none;
    }
    .video-placeholder {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:var(--surface2); color:var(--grey);
      font-size:0.9rem; font-weight:300; gap:12px;
    }
    .video-placeholder .icon { font-size:3rem; opacity:0.4; }

    /* Lesson info */
    .lesson-info { padding:28px 32px; flex:1; }
    .lesson-module-tag { font-size:0.7rem; color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
    .lesson-title { font-size:1.4rem; font-weight:700; margin-bottom:12px; }
    .lesson-desc { font-size:0.875rem; color:var(--silver); font-weight:300; line-height:1.9; max-width:700px; }

    /* Nav buttons */
    .lesson-nav { display:flex; gap:12px; margin-top:28px; padding-top:24px; border-top:1px solid var(--border); }
    .nav-btn {
      padding:10px 24px; font-size:0.85rem;
      font-family:'Gumela','Cairo',sans-serif;
      border:1px solid var(--border); background:transparent;
      color:var(--silver); cursor:pointer; border-radius:0;
      transition:all 0.2s;
    }
    .nav-btn:hover { border-color:rgba(201,168,76,0.4); color:var(--ivory); }
    .nav-btn.primary { background:var(--gold); color:#000; border-color:var(--gold); font-weight:700; }
    .nav-btn.primary:hover { background:#E8D08A; }
    .nav-btn:disabled { opacity:0.3; cursor:not-allowed; }

    /* Loading / Access denied overlay */
    .overlay {
      position:fixed; inset:0; background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:1000; text-align:center; padding:32px;
    }
    .overlay.hidden { display:none; }

    /* Spinner */
    .spinner {
      width:40px; height:40px; border-radius:50%;
      border:2px solid rgba(201,168,76,0.2);
      border-top-color:var(--gold);
      animation:spin 0.8s linear infinite;
      margin-bottom:20px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Mobile */
    @media (max-width:768px) {
      .layout-body { grid-template-columns:1fr; }
      .sidebar { display:none; }
      .sidebar.mobile-open { display:flex; position:fixed; inset:0; z-index:100; }
      .lesson-info { padding:20px; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay (shown while validating) -->
  <div id="loading-overlay" class="overlay">
    <div class="spinner"></div>
    <p style="font-size:0.85rem;color:var(--grey);font-weight:300;">جاري التحقق...</p>
  </div>

  <!-- Access denied overlay (hidden by default, shown only if token invalid) -->
  <div id="access-denied" class="overlay hidden">
    <div style="font-size:3rem;margin-bottom:24px;">&#x1F512;</div>
    <h2 style="font-size:1.6rem;font-weight:700;margin-bottom:12px;">رابط الوصول غير صحيح</h2>
    <p style="font-size:0.9rem;color:var(--silver);font-weight:300;line-height:1.8;max-width:400px;margin-bottom:32px;">
      هذا الرابط غير صالح أو منتهي الصلاحية.<br>
      تحقق من الإيميل اللي وصلك عند الشراء.
    </p>
    <a href="https://courses.malearnsa.com" style="background:var(--gold);color:#000;font-weight:700;padding:14px 36px;text-decoration:none;font-family:'Gumela','Cairo',sans-serif;">اشتري الدورة</a>
  </div>

  <div class="layout" id="course-layout" style="display:none;">

    <!-- Top Nav -->
    <nav class="top-nav">
      <div class="course-name">مدخل إلى الذكاء الاصطناعي الإبداعي</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="progress-text" id="progress-text">الدرس 1 من 19</span>
        <img src="brand_assets/logo-malearn-white.png" alt="MA Learn" style="height:28px;width:auto;" onerror="this.style.display='none'">
      </div>
    </nav>

    <div class="layout-body">

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">محتوى الدورة</div>

        <div id="curriculum-list">
          <!-- Dynamically populated by JS -->
        </div>
      </aside>

      <!-- Main -->
      <main class="main-content">
        <div class="video-area">
          <div class="video-wrapper">
            <div class="video-placeholder" id="video-placeholder">
              <span class="icon">▶</span>
              <span>اختر درساً للبدء</span>
            </div>
            <div id="video-container" style="display:none;position:absolute;inset:0;">
              <iframe id="video-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
          </div>
        </div>

        <div class="lesson-info">
          <p class="lesson-module-tag" id="lesson-module">—</p>
          <h2 class="lesson-title" id="lesson-title">اختر درساً من القائمة</h2>
          <p class="lesson-desc" id="lesson-desc">اختر أي درس من القائمة على اليسار لتبدأ المشاهدة.</p>
          <div class="lesson-nav">
            <button class="nav-btn" id="btn-prev" onclick="navigateLesson(-1)" disabled>→ السابق</button>
            <button class="nav-btn primary" id="btn-next" onclick="navigateLesson(1)" disabled>التالي ←</button>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script>
    // ══════════════════════════════════════════
    // CURRICULUM DATA
    // Replace YouTube video IDs with actual unlisted video IDs
    // Format: { id, title, videoId (YouTube), desc }
    // ══════════════════════════════════════════
    const curriculum = [
      {
        module: 'الوحدة 1 — مقدمة',
        lessons: [
          { id: 1, title: 'ليش خايف من الـ AI؟', videoId: 'REPLACE_VIDEO_ID_1', desc: 'نفهم سبب الخوف والتشويش من الذكاء الاصطناعي، ونحدد كيف نتعامل مع هذا العالم الجديد بثقة.' }
        ]
      },
      {
        module: 'الوحدة 2 — خريطة الذكاء الاصطناعي للمبدعين',
        lessons: [
          { id: 2, title: 'العقلية والتوقعات', videoId: 'REPLACE_VIDEO_ID_2', desc: 'كيف تفكر في الذكاء الاصطناعي كمبدع — ما هو، ما هو مو، وش تتوقع منه وش ما تتوقع.' },
          { id: 3, title: 'الفئة الأولى — شريك التفكير (LLM)', videoId: 'REPLACE_VIDEO_ID_3', desc: 'نماذج اللغة الكبيرة — ما هي وكيف تستخدمها في عملك الإبداعي اليومي.' },
          { id: 4, title: 'الفئة الثانية — الاستوديو (Video / Photo / Edit)', videoId: 'REPLACE_VIDEO_ID_4', desc: 'أدوات توليد الصور والفيديو والتحرير — خريطة شاملة لكل ما تحتاجه.' },
          { id: 5, title: 'الفئة الثالثة — أنظمة سير العمل', videoId: 'REPLACE_VIDEO_ID_5', desc: 'كيف تربط الأدوات مع بعض في منظومة عمل متكاملة.' },
          { id: 6, title: 'تفصيل بناء منظومتك الخاصة', videoId: 'REPLACE_VIDEO_ID_6', desc: 'خطوة بخطوة — كيف تختار أدواتك وتبني منظومتك الشخصية.' },
          { id: 7, title: 'البرومبت — للـ LLM والصور والفيديو', videoId: 'REPLACE_VIDEO_ID_7', desc: 'أساسيات كتابة البرومبت لكل فئة من الأدوات — عملي ومباشر.' }
        ]
      },
      {
        module: 'الوحدة 3 — شريك التفكير',
        lessons: [
          { id: 8, title: 'Claude', videoId: 'REPLACE_VIDEO_ID_8', desc: 'كيف تستخدم Claude في بناء البريفات الإبداعية، الأفكار، والاستراتيجية.' },
          { id: 9, title: 'Gemini (incl. Gems)', videoId: 'REPLACE_VIDEO_ID_9', desc: 'Gemini وGems — كيف تبني مساعداً إبداعياً مخصص لك.' },
          { id: 10, title: 'Firefly Boards', videoId: 'REPLACE_VIDEO_ID_10', desc: 'Adobe Firefly Boards لبناء مود بوردات وأفكار بصرية بسرعة.' }
        ]
      },
      {
        module: 'الوحدة 4 — توليد الصور والفيديوهات',
        lessons: [
          { id: 11, title: 'Midjourney', videoId: 'REPLACE_VIDEO_ID_11', desc: 'Midjourney للتصور المسبق والمود بوردات والحملات البصرية.' },
          { id: 12, title: 'Higgsfield', videoId: 'REPLACE_VIDEO_ID_12', desc: 'Higgsfield للفيديو الإبداعي — ما يميزه وكيف تستفيد منه.' },
          { id: 13, title: 'Veo & Kling', videoId: 'REPLACE_VIDEO_ID_13', desc: 'أدوات الفيديو — Veo وKling ومقارنة عملية بينهم.' },
          { id: 14, title: 'Upscaling — Topaz, Magnific, Skin Realism', videoId: 'REPLACE_VIDEO_ID_14', desc: 'رفع جودة الصور — Topaz وMagnific وSkin Realism.' },
          { id: 15, title: 'Image Retouching — Retouch4ME, Evoto', videoId: 'REPLACE_VIDEO_ID_15', desc: 'ريتوش الصور بالذكاء الاصطناعي — Retouch4ME وEvoto.' }
        ]
      },
      {
        module: 'الوحدة 5 — بناء أنظمة سير العمل',
        lessons: [
          { id: 16, title: 'المنصات المختلفة', videoId: 'REPLACE_VIDEO_ID_16', desc: 'كيف تربط أدوات مختلفة في سير عمل متكامل عبر منصات متعددة.' },
          { id: 17, title: 'منصة موحدة (Figmaweave / Freepik Spaces)', videoId: 'REPLACE_VIDEO_ID_17', desc: 'العمل من منصة واحدة — Figmaweave وFreepik Spaces.' }
        ]
      },
      {
        module: 'الوحدة 6 — التطبيق العملي',
        lessons: [
          { id: 18, title: 'مشروع LUMA — حملة أزياء (صور فقط)', videoId: 'REPLACE_VIDEO_ID_18', desc: 'من البريف للنتيجة — حملة أزياء كاملة باستخدام ChatGPT وMidjourney وLightroom AI.' },
          { id: 19, title: 'مشروع MEEM و SAFI — فيديو + صور وفيديو', videoId: 'REPLACE_VIDEO_ID_19', desc: 'مشروعان عمليان — فيديو منتج قهوة وحملة إطلاق سيروم عناية بالبشرة.' }
        ]
      }
    ];

    // ══════════════════════════════════════════
    // TOKEN VALIDATION
    // ══════════════════════════════════════════
    const VALIDATION_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzXC4Ef5WxNX0aPov7Q1Kdn2DiXuODd74w3iOCtovrw86o9grwVREqNsRdhlyQkoBnQ/exec';

    async function validateToken(token) {
      try {
        const res = await fetch(`${VALIDATION_ENDPOINT}?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        return data.valid === true;
      } catch (e) {
        // If validation fails, allow access (fail open — prevents blocking paying students)
        console.warn('Token validation failed, allowing access:', e);
        return true;
      }
    }

    // ══════════════════════════════════════════
    // COURSE PLAYER LOGIC
    // ══════════════════════════════════════════
    let currentLessonIndex = 0;
    let allLessons = [];

    // Flatten curriculum into lessons array
    curriculum.forEach(module => {
      module.lessons.forEach(lesson => {
        allLessons.push({ ...lesson, moduleName: module.module });
      });
    });

    function buildSidebar() {
      const container = document.getElementById('curriculum-list');
      curriculum.forEach((module, mi) => {
        const group = document.createElement('div');
        group.className = 'module-group';

        const header = document.createElement('div');
        header.className = 'module-title';
        header.innerHTML = `<span>${module.module}</span><span>${module.lessons.length} دروس</span>`;
        header.onclick = () => {
          list.classList.toggle('open');
        };

        const list = document.createElement('div');
        list.className = 'lesson-list' + (mi === 0 ? ' open' : '');

        module.lessons.forEach((lesson) => {
          const globalIndex = allLessons.findIndex(l => l.id === lesson.id);
          const item = document.createElement('div');
          item.className = 'lesson-item';
          item.id = `lesson-item-${lesson.id}`;
          item.innerHTML = `<span class="dot"></span>${lesson.title}`;
          item.onclick = () => loadLesson(globalIndex);
          list.appendChild(item);
        });

        group.appendChild(header);
        group.appendChild(list);
        container.appendChild(group);
      });
    }

    function loadLesson(index) {
      if (index < 0 || index >= allLessons.length) return;

      // Update active state
      document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
      const lesson = allLessons[index];
      const item = document.getElementById(`lesson-item-${lesson.id}`);
      if (item) { item.classList.add('active'); item.classList.add('watched'); }

      currentLessonIndex = index;

      // Update video
      const placeholder = document.getElementById('video-placeholder');
      const container = document.getElementById('video-container');
      const iframe = document.getElementById('video-iframe');

      if (lesson.videoId && lesson.videoId !== 'REPLACE_VIDEO_ID_' + lesson.id) {
        placeholder.style.display = 'none';
        container.style.display = 'block';
        iframe.src = `https://www.youtube.com/embed/${lesson.videoId}?autoplay=1&rel=0`;
      } else {
        container.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.innerHTML = '<span class="icon">🎬</span><span>الفيديو قادم قريباً</span>';
      }

      // Update info
      document.getElementById('lesson-module').textContent = lesson.moduleName;
      document.getElementById('lesson-title').textContent = lesson.title;
      document.getElementById('lesson-desc').textContent = lesson.desc;
      document.getElementById('progress-text').textContent = `الدرس ${index + 1} من ${allLessons.length}`;

      // Update nav buttons
      document.getElementById('btn-prev').disabled = index === 0;
      document.getElementById('btn-next').disabled = index === allLessons.length - 1;
      document.getElementById('btn-next').textContent = index === allLessons.length - 1 ? 'آخر درس ✓' : 'التالي ←';
    }

    function navigateLesson(direction) {
      loadLesson(currentLessonIndex + direction);
    }

    // ══════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        document.getElementById('loading-overlay').classList.add('hidden');
        document.getElementById('access-denied').classList.remove('hidden');
        return;
      }

      const valid = await validateToken(token);

      document.getElementById('loading-overlay').classList.add('hidden');

      if (!valid) {
        document.getElementById('access-denied').classList.remove('hidden');
        return;
      }

      // Token valid — show course
      document.getElementById('course-layout').style.display = 'grid';

      buildSidebar();
      loadLesson(0);
    }

    init();
  </script>
</body>
</html>
